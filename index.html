<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <link rel="icon" type="image/x-icon" href="images/logo.ico">

<body class="bg-dark">
    <div class="col-12 d-flex justify-content-center min-vh-100 align-items-center">
        <div class="card col-11 col-md-8 col-lg-7 justify-content-center align-items-center bg-light">
            <div class="card-body">
                
                <h1 class="col-12 text-center my-3">Weather App</h1>
                <div class="row mb-4" id="divWeather"></div>
                <form>
                    <input class="form-control form-control-lg mt-4" id="txtCityName" placeholder="Enter City Name" aria-label="City Name">
                    <button class="btn btn-primary btn-lg mt-1 col-12" type="button" id="btnSearch">Find Weather</button>
                </form>

            </div>
        </div>
    </div>



    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    <script src="js/app.js"></script>
