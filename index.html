<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <link rel="icon" type="image/x-icon" href="images/logo.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon-iphone60x60.png">
    <link rel="apple-touch-icon" sizes="76x76" href="images/apple-touch-icon-ipad-76x76.png">
    <link rel="apple-touch-icon" sizes="120x120" href="images/apple-touch-icon-iphone-retina-120x120.png">
    <link rel="apple-touch-icon" sizes="152x152" href="images/apple-touch-icon-ipad-retina-152x152.png">

    <title>Weather App</title>

    <link rel="stylesheet" href="css/lib/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-dark">
    <div class="col-12 d-flex justify-content-center min-vh-100 align-items-center">
        <div class="card col-11 col-md-8 col-lg-7 justify-content-center align-items-center bg-light">
            <div class="card-body">
                
                <h1 class="col-12 text-center my-3">Weather App</h1>
                <div class="row mb-4" id="divWeather"></div>
                <form>
                    <input class="form-control form-control-lg mt-4" id="txtCityName" placeholder="Enter City Name" aria-label="City Name">
                    <button class="btn btn-primary btn-lg mt-1 col-12" type="button" id="btnSearch">Find Weather</button>
                </form>
                <p class="text-center"> Powered By <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a> </p>

            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    

<script>
    document.querySelector('#btnSearch').addEventListener('click', () => {
        const strCity = document.querySelector('#txtCityName').value

        // this gets the long, lat of given city and return info
        
        fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${strCity}&count=1`)
        .then(result => {
            if(result.ok){
                return result.json()
            } else {
                throw new Error(result.status)
            }
        })
        .then(data => {
            // store data for next fetch 
            let strLat = data.results[0].latitude
            let strLong = data.results[0].longitude

            // store state and name, do this because user may type city in lower case so it solves for that case
            // also gives the user an idea what possible country they may have incase they get wrong response 
            let strCityName = data.results[0].name
            let strState = data.results[0].admin1
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${strLat}&longitude=${strLong}&current=temperature_2m,relative_humidity_2m,weather_code`)
            .then(result => {
            if(result.ok){
                return result.json()
            } else {
                throw new Error(result.status)
            }
            })
            .then(data => {
                // set weather code icons & conditions
                let weatherCode = data.current.weather_code
                let currentWeatherIcon = ''
                let condition = ''
                if(weatherCode == 0) {
                    currentWeatherIcon = '<i class="bi bi-sun-fill"></i>'
                    condition = 'Clear Sky'
                }
                if(weatherCode >= 1 && weatherCode <= 3) {
                    currentWeatherIcon = '<i class="bi bi-cloud-sun-fill"></i>'
                    condition = 'Mostly Clear'
                }
                if(weatherCode >= 45 && weatherCode <= 48) {
                    currentWeatherIcon = '<i class="bi bi-cloud-fog-fill"></i>'
                    condition = 'Foggy'
                }
                if(weatherCode >= 51 && weatherCode <= 67) {
                    currentWeatherIcon = '<i class="bi bi-cloud-drizzle-fill"></i>'
                    condition = 'Rainy'
                }
                if(weatherCode >= 71 && weatherCode <= 77) {
                    currentWeatherIcon = '<i class="bi bi-cloud-snow-fill"></i>'
                    condition = 'Snowing'
                }
                if(weatherCode == 95) {
                    currentWeatherIcon = '<i class="bi bi-cloud-lightning-rain-fill"></i>'
                    condition = 'Thundering'
                }

                // Update the divWeather
                document.querySelector('#divWeather').innerHTML = `

                    <div class="col-md-6 d-flex align-items-center justify-content-center">
                        <h1> <i class="bi bi-geo-alt text-danger"></i></h1>
                        <h3 style="color: Red;">${strCityName}, ${strState}</h2>
                    </div>

                    <div class="col-md-6 d-flex flex-column align-items-center justify-content-center gap-3">
                        <h4 class="col-12 text-center" style="color: grey">Current Conditions</h4>
                        <h4>${currentWeatherIcon} ${condition}</h4>
                        <hr style="width: 80%; border: 1px solid black;">
                        <div class="d-flex gap-5">
                            <h4> <i class="bi bi-thermometer-half"></i> ${data.current.temperature_2m}°C</h4>
                            <h4> <i class="bi bi-moisture"></i> ${data.current.relative_humidity_2m}% Humidity</h3>
                        </div>
                    </div>
                `
            })  
        })
        .catch(error => {
            document.querySelector('#divWeather').innerHTML = `
                <div class="col-md-6 d-flex align-items-center justify-content-center">
                    <h1><i class="bi bi-geo-alt text-danger"></i></h1>
                    <h3 style="color:red;">Invalid City</h3>
                </div>

                <div class="col-md-6 d-flex flex-column align-items-center justify-content-center gap-3">
                    <h4 class="col-12 text-center" style="color:red">Cant Fetch Conditions</h4>
                    <h5><i class="bi bi-exclamation-octagon-fill"></i> Try Again</h5>
                </div>
            `
            console.error(error)
        })

    })
</script>

</body>
</html>
